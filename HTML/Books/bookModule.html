            <!-- Main body content -->
            <main
                class="main-content flex-grow-1 overflow-y-auto overflow-x-hidden">

                <!-- Top Navbar -->
                <nav id="main-navbar"
                    class="navbar navbar-expand main-navbar sticky-top bg-white shadow-sm py-3 px-2">
                    <div
                        class="container-fluid p-0 d-flex justify-content-between">

                        <!-- Left Section: Toggle Button & Search -->
                        <div class="d-flex align-items-center">
                            <button id="sidebarCollapseBtn"
                                class="btn border-0 me-2 d-flex align-items-center justify-content-center">
                                <div class="hamburger-placeholder">
                                    <img src="../../Icons/toggle-btn.svg"
                                        alt="toggle-btn" class="img-fluid"
                                        width="25"
                                        height="25">
                                </div>
                            </button>
                            <div
                                class="search-box input-group d-none d-md-flex px-2">
                                <span
                                    class="input-group-text bg-light border-0">
                                    <img src="../../Icons/Search.svg"
                                        alt="search" width="20" height="20">
                                </span>

                        <!-- Right Section: Actions & Profile -->

                                        alt="sms" width="25" height="25">

                                <div
                                    class="me-3 d-flex justify-content-center align-items-center">
                                    <img src="../../Icons/notification.svg"
                                        alt="notification" width="25"
                                        height="25">
                                </div>

                                class="d-flex justify-content-center align-items-center">

                    </div>
                </nav>

                <!-- Body content -->
                <div class="container-fluid p-sm-4 p-3">
                    <div class="d-flex justify-content-between">
                        <div class="d-flex">
                            <p class="fs-4 m-0 fw-semibold">Book List</p>
                        </div>

                        <div
                            class="d-flex flex-sm-row flex-column justify-content-center align-items-sm-center align-items-end gap-3">
                            <div
                                class="d-flex align-items-center gap-1 order-sm-0 order-1">
                                <p
                                    class="fw-medium text-secondary m-0">Type:</p>
                                <select
                                    class="fw-semibold bg-transparent border-0 cursor-pointer form-select py-1"
                                    id="categoryFilter"
                                    aria-label="Default select example"
                                    onchange="filterBooks()">
                                    <option value="All" selected>All</option>
                                    <option value="Self-help">Self-help</option>
                                    <option value="Finance">Finance</option>
                                    <option value="Fiction">Fiction</option>
                                    <option
                                        value="Historical">Historical</option>
                                    <option value="Sci-Fi">Sci-Fi</option>
                                </select>
                            </div>

                            <button
                                class="btn btn-primary addBtn px-4 py-2 order-sm-1 order-0"
                                data-bs-toggle="modal"
                                data-bs-target="#addBook"><span
                                    class="fw-medium">Add Book</span></button>

                        </div>
                    </div>

                    <div class="booksGrid mt-4">
                        <div class="row g-sm-4 g-md-5 g-lg-4 g-3"
                            id="booksGrid">
                            <!-- Available Books will be rendered here. -->
                        </div>
                    </div>
                </div>

                <!-- Modal to add new book -->
                <div class="modal fade" id="addBook" tabindex="-1"
                    aria-labelledby="formModalLabel" aria-hidden="true">
                    <div
                        class="modal-dialog modal-dialog-centered modal-lg justify-content-center">
                        <div
                            class="modal-content w-100 rounded-3 shadow-lg border-0">
                            <div
                                class="modal-header d-flex justify-content-start align-items-center border-bottom-0 px-4 py-3">
                                <p class="modal-title h2 fw-semibold mb-0 fs-4"
                                    id="formModalLabel">Add Book</p>
                                <button type="button" class="btn-close"
                                    data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body p-4">
                                <form id="bookForm">
                                    <div class="row g-4 py-2">
                                        <div class="col-12">
                                            <div>
                                                <label for="bookName"
                                                    class="form-label fw-medium text-secondary">Name:</label>
                                                <input type="text"
                                                    oninput="validateFormInput(); validateName()"
                                                    class="form-control form-control-lg"
                                                    id="bookName"
                                                    placeholder="Enter book name"
                                                    required>
                                                <div
                                                    class="invalid-feedback fw-semibold">Please
                                                    enter a valid book name with
                                                    no leading space!</div>
                                            </div>
                                        </div>
                                        <div class="col-12">
                                            <div>
                                                <label for="productName"
                                                    class="form-label fw-medium text-secondary">PDF
                                                    File:</label>
                                                <input type="file"
                                                    oninput="validateFormInput()"
                                                    onchange="validateFileType()"
                                                    class="form-control form-control-lg"
                                                    id="bookPdf"
                                                    placeholder="Name"
                                                    accept="application/pdf"
                                                    required>
                                                <div
                                                    class="invalid-feedback fw-semibold">Please
                                                    upload only PDF files!</div>
                                            </div>

                                        </div>
                                        <div class="col-12">
                                            <div>
                                                <label for="bookType"
                                                    class="form-label fw-medium text-secondary">Book
                                                    Type:</label>
                                                <select
                                                    class="form-select form-select-lg"
                                                    id="bookType"
                                                    oninput="validateFormInput()"
                                                    aria-label="Select Type"
                                                    required>
                                                    <option value="Self-help"
                                                        selected>Self-help</option>
                                                    <option
                                                        value="Finance">Finance</option>
                                                    <option
                                                        value="Fiction">Fiction</option>
                                                    <option
                                                        value="Historical">Historical</option>
                                                    <option
                                                        value="Sci-Fi">Sci-Fi</option>
                                                </select>
                                            </div>

                                        </div>

                                    </div>
                                    <div
                                        class="d-flex gap-2 justify-content-end mt-5">
                                        <button type="button" id="cancelBtn"
                                            class="btn btn-outline-primary px-4 py-2 rounded-3"
                                            data-bs-dismiss="modal"><span
                                                class="px-sm-4 px-3">Cancel</span></button>
                                        <button type="submit"
                                            class="btn btn-submit-custom bg-primary cursor-nodrop text-white px-4 py-2 rounded-3 fw-bold"
                                            id="submitBtn" disabled>
                                            <span
                                                class="px-sm-4 px-3">Save</span>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Delete Confirmation Modal -->
                <div class="modal fade" id="deleteModal" tabindex="-1"
                    aria-labelledby="deleteModalLabel"
                    aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header border-bottom-0">
                                <h5 class="modal-title" id="deleteModalLabel">
                                    Delete Book</h5>
                                <button type="button" class="btn-close"
                                    data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body my-3">
                                Are you sure you want to delete this book?
                            </div>
                            <div class="modal-footer border-top-0">
                                <button type="button"
                                    class="btn btn-outline-primary px-5"
                                    data-bs-dismiss="modal">No</button>
                                <button type="button"
                                    class="btn btn-primary px-5"
                                    data-bs-dismiss="modal"
                                    id="confirmDelete"
                                    onclick="confirmDelete()">Yes</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Notification Toast -->
                <div class="position-fixed bottom-0 end-0 p-3">
                    <div id="notificationToast" class="toast border-0 w-100"
                        role="alert"
                        aria-live="assertive" aria-atomic="true">
                        <div class="d-flex">
                            <div
                                class="toast-body toast-message fw-bold text-center">
                                <!-- Toast message -->
                            </div>
                            <button type="button"
                                class="btn-close btn-close-white me-2 m-auto"
                                data-bs-dismiss="toast"
                                aria-label="Close"></button>
                        </div>
                    </div>
                </div>

            </main>

        </div>

        <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../../JavaScript/toggleSidebar.js" defer></script>
        <script src="../../JavaScript/booksPage/bookModule.js" defer></script>
    </body>

</html>
