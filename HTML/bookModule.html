<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Book Module</title>
        <link rel="stylesheet" href="../CSS/styles.css">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous">
    </head>
    <body>
        <div class="wrapper d-flex">
            <aside class="sidebar bg-white d-flex flex-column shadow-sm">
                <div class="d-flex justify-content-between p-4">
                    <div class="sidebar-logo">
                        <img src="../Icons/Logo.svg" alt="logo" height="40"
                            width="auto">
                    </div>
                </div>
            </aside>
            <div class="main w-100 overflow-hidden bg-white">
                <nav class="navbar d-flex w-100 flex-row p-3 shadow-sm">
                    <button class="toggle-btn border-0 bg-transparent"
                        type="button">
                        <img src="../Icons/toggle-btn.svg" alt="toggle"
                            height="25" width="25" id="icon">
                    </button>
                </nav>
            </div>
        </div>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        <script src="../JavaScript/bookModule.js"></script>
    </body>
</html>
