<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Books Module</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
            rel="stylesheet">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="../CSS/styles.css">
        <link rel="shortcut icon" href="../Images/books-favicon.png"
            type="image/x-icon">
    </head>

    <body>
        <div class="wrapper d-flex vh-100 overflow-hidden">

            <nav id="sidebar" class="sidebar bg-white shadow">
                <div class="sidebar-header">
                    <div
                        class="logo-placeholder bg-info bg-gradient rounded align-items-center justify-content-center me-2"
                        id="logo-placeholder">
                        <span class="text-white fw-bold">ML</span>
                    </div>

                    <p
                        class="mb-0 fw-bold d-flex justify-content-center align-items-center logo-text text-uppercase">
                        <img src="../Icons/Logo.svg" alt="Logo"
                            class="img-fluid">
                    </p>
                </div>

                <!-- List of navigation items -->
                <ul class="nav flex-column mt-3">
                    <li class="nav-item">
                        <a href="#"
                            class="nav-link d-flex align-items-center active">

                            <div
                                class="icon-placeholder me-3 bg-transparent d-flex align-items-center justify-content-center">
                                <img src="../Icons/note.svg" alt="notes"
                                    class="img-fluid" width="24" height="24">
                            </div>
                            <span class="menu-text fw-medium">Books</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link d-flex align-items-center">
                            <div
                                class="icon-placeholder me-3 bg-transparent d-flex align-items-center justify-content-center">
                                <img src="../Icons/heart.svg" alt="heart"
                                    class="img-fluid" width="24" height="24">
                            </div>
                            <span class="menu-text fw-medium">Dreamboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link d-flex align-items-center">
                            <div
                                class="icon-placeholder me-3 bg-transparent d-flex align-items-center justify-content-center">
                                <img src="../Icons/video-square.svg" alt="video"
                                    class="img-fluid" width="24" height="24">
                            </div>
                            <span class="menu-text fw-medium">Audio
                                lectures</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link d-flex align-items-center">
                            <div
                                class="icon-placeholder me-3 bg-transparent d-flex align-items-center justify-content-center">
                                <img src="../Icons/sms.svg" alt="Messages"
                                    class="img-fluid" width="24" height="24">
                            </div>
                            <span class="menu-text fw-medium">Messages</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link d-flex align-items-center">
                            <div
                                class="icon-placeholder me-3 bg-transparent d-flex align-items-center justify-content-center">
                                <img src="../Icons/flag.svg" alt="flag"
                                    class="img-fluid" width="24" height="24">
                            </div>
                            <span class="menu-text fw-medium">Goal
                                Setting</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <main
                class="main-content flex-grow-1 overflow-y-auto overflow-x-hidden">

                <nav id="main-navbar"
                    class="navbar navbar-expand main-navbar sticky-top bg-white shadow-sm p-3">
                    <div
                        class="container-fluid p-0 d-flex justify-content-between">

                        <!-- Left Section: Toggle Button & Search -->
                        <div class="d-flex align-items-center">
                            <button id="sidebarCollapseBtn"
                                class="btn border-0 me-3 d-flex align-items-center justify-content-center">
                                <div class="hamburger-placeholder">
                                    <img src="../Icons/toggle-btn.svg"
                                        alt="toggle-btn" class="img-fluid"
                                        width="25"
                                        height="25">
                                </div>
                            </button>
                            <div
                                class="search-box input-group d-none d-md-flex px-2">
                                <span
                                    class="input-group-text bg-light border-0">
                                    <img src="../Icons/Search.svg" alt="search">
                                </span>
                                <input type="text"
                                    class="form-control bg-light border-0 py-2 rounded-3"
                                    placeholder="Search">
                            </div>
                        </div>

                        <!-- Right Section: Actions & Profile -->
                        <div class="d-flex align-items-center">
                            <div class="d-flex  d-none d-sm-flex">
                                <div
                                    class="me-3 d-flex justify-content-center align-items-center">
                                    <img src="../Icons/theme-switcher.svg"
                                        alt="theme-toggle" width="40"
                                        height="40">
                                </div>
                                <div
                                    class="me-3 d-flex justify-content-center align-items-center">
                                    <img src="../Icons/sms-notified.svg"
                                        alt="sms" width="25" height="25">
                                </div>
                                <div
                                    class="me-3 d-flex justify-content-center align-items-center">
                                    <img src="../Icons/notification.svg"
                                        alt="notification" width="25"
                                        height="25">
                                </div>
                            </div>
                            <div
                                class="d-flex justify-content-center align-items-center">
                                <div>
                                    <img src="../Icons/profile.svg"
                                        alt="profile">
                                </div>
                            </div>
                        </div>

                    </div>
                </nav>

                <div class="container-fluid p-4">
                    <div
                        class="d-flex align-items-center justify-content-between">
                        <p class="fw-medium h5 m-0">Book List</p>

                        <div
                            class="d-flex flex-sm-row flex-column justify-content-center align-items-sm-center align-items-end gap-3">
                            <div class="d-flex align-items-center gap-3">
                                <p class="fw-normal m-0">Type:</p>
                                <select class="form-select py-1" id="bookType"
                                    aria-label="Default select example" onchange="filterBooks()">
                                    <option selected>All</option>
                                    <option value="Self-help">Self-help</option>
                                    <option value="Finance">Finance</option>
                                    <option value="Fiction">Fiction</option>
                                    <option value="Historical">Historical</option>
                                    <option value="Sci-Fi">Sci-Fi</option>
                                </select>
                            </div>

                            <button class="btn btn-primary addBtn px-4 py-1"
                                data-bs-toggle="modal"
                                data-bs-target="#addBook">Add
                                Book</button>

                        </div>
                    </div>

                    <div class="booksGrid mt-5">
                        <div class="row g-5" id="booksGrid"></div>
                        <!-- Available Books will be rendered here. -->
                    </div>
                </div>

                <div class="modal fade" id="addBook" tabindex="-1"
                    aria-labelledby="formModalLabel" aria-hidden="true"
                    data-bs-backdrop="static" data-bs-keyboard="false">
                    <div class="modal-dialog modal-dialog-centered modal-lg">
                        <div class="modal-content rounded-4 shadow-lg border-0">
                            <div
                                class="modal-header d-flex justify-content-center border-bottom py-4">
                                <div class="d-flex align-items-center gap-2">
                                    <img src="../Icons/addBook-icon.svg"
                                        id="modalHeader" alt="addBook"
                                        width="30"
                                        height="30">
                                    <p class="modal-title h2 fw-bold mb-0 fs-4"
                                        id="formModalLabel">Add Book</p>
                                </div>
                            </div>
                            <div class="modal-body p-4">
                                <form id="bookForm">
                                    <div class="row g-3">
                                        <div class="col-12">
                                            <div class="mb-3">
                                                <label
                                                    for="bookName"
                                                    class="form-label">Name
                                                    *</label>
                                                <input type="text"
                                                    oninput="validateFormInput()"
                                                    class="form-control"
                                                    id="bookName"
                                                    placeholder="Enter book name"
                                                    required>
                                            </div>
                                        </div>
                                        <div class="col-12">
                                            <div class="mb-3">
                                                <label for="productName">PDF
                                                    File
                                                    *</label>
                                                <input type="file"
                                                    oninput="validateFormInput()"
                                                    class="form-control rounded-3 "
                                                    id="bookPdf"
                                                    placeholder="Name"
                                                    accept="application/pdf"
                                                    required>
                                                <div
                                                    class="invalid-feedback">Please
                                                    Upload Appropriate
                                                    PDF!</div>
                                            </div>

                                        </div>
                                        <div class="col-12">
                                            <div class="mb-3">
                                                <label for="bookType">Book Type
                                                    *</label>
                                                <select class="form-select"
                                                    id="bookType"
                                                    oninput="validateFormInput()"
                                                    aria-label="Select Type"
                                                    required>
                                                    <option
                                                        selected
                                                        value>All</option>
                                                    <option
                                                        value="Self-help">Self-help</option>
                                                    <option
                                                        value="Finance">Finance</option>
                                                    <option
                                                        value="Fiction">Fiction</option>
                                                    <option
                                                        value="Historical">Historical</option>
                                                    <option
                                                        value="Sci-Fi">Sci-Fi</option>
                                                </select>
                                            </div>

                                        </div>

                                    </div>
                                    <div
                                        class="d-flex gap-2 justify-content-end mt-4">
                                        <button type="button" id="cancelBtn"
                                            class="btn btn-light px-4 rounded-3"
                                            data-bs-dismiss="modal">Cancel</button>
                                        <button type="submit"
                                            class="btn btn-submit-custom bg-primary cursor-nodrop text-white px-4 rounded-3 fw-bold"
                                            id="submitBtn"
                                            disabled>
                                            <span>Submit</span>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

        </div>

        <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../JavaScript/bookModule.js"></script>
    </body>

</html>
