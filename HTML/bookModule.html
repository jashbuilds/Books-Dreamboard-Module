<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Premium Layout</title>
    <!-- 
        EXTERNAL ASSETS
        - Google Fonts (Outfit) for modern typography
        - Bootstrap 5 for professional grid and utility classes 
    -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>
    <!-- 
        LAYOUT CONTAINER (The Wrapper)
        Using 'd-flex vh-100 overflow-hidden' from Bootstrap to create the side-by-side layout.
        Background color is set on 'body' in CSS to match the reference image.
    -->
    <div class="wrapper d-flex vh-100 overflow-hidden">

        <!-- 
            1. SIDEBAR NAVIGATION
            - Desktop: Collapses to 85px (icons only)
            - Mobile: Slides in as an 85px overlay
            - We use 'bg-white' for the white background
            - Border and shadow are handled in CSS (box-shadow instead of border-end)
        -->
        <nav id="sidebar" class="bg-white">
            <div class="sidebar-header">
                <!-- Simple placeholder for the Logo -->
                <!-- We use class 'logo-placeholder' which is styled in CSS -->
                <div class="logo-placeholder bg-info rounded align-items-center justify-content-center me-2"
                    id="logo-placeholder">
                    <span class="text-white fw-bold">ML</span>
                </div>
                <!-- Text that fades out when the sidebar shrinks on desktop -->
                <h5 class="mb-0 fw-bold logo-text text-uppercase tracking-wider">
                    <img src="../Icons/Logo.svg" alt="Logo" class="img-fluid">
                </h5>
            </div>

            <!-- List of navigation items -->
            <ul class="nav flex-column mt-3">
                <li class="nav-item">
                    <a href="#" class="nav-link mx-3 rounded-3 active">
                        <!-- Icon placeholder: rounded-2 gives a soft square shape (like the reference image icons) -->
                        <div class="icon-placeholder bg-transparent d-flex align-items-center justify-content-center">
                            <img src="../Icons/note.svg" alt="notes" class="img-fluid" width="24" height="24">
                        </div>
                        <span class="menu-text">Note</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link mx-3 rounded-3">
                        <!-- Icon placeholder: rounded-2 gives a soft square shape (like the reference image icons) -->
                        <div class="icon-placeholder bg-transparent d-flex align-items-center justify-content-center">
                            <img src="../Icons/heart.svg" alt="heart" class="img-fluid" width="24" height="24">
                        </div>
                        <span class="menu-text">Dreamboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link mx-3 rounded-3">
                        <!-- Icon placeholder: rounded-2 gives a soft square shape (like the reference image icons) -->
                        <div class="icon-placeholder bg-transparent d-flex align-items-center justify-content-center">
                            <img src="../Icons/video-square.svg" alt="video" class="img-fluid" width="24" height="24">
                        </div>
                        <span class="menu-text">Audio lectures</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link mx-3 rounded-3">
                        <!-- Icon placeholder: rounded-2 gives a soft square shape (like the reference image icons) -->
                        <div class="icon-placeholder bg-transparent d-flex align-items-center justify-content-center">
                            <img src="../Icons/sms.svg" alt="Messages" class="img-fluid" width="24" height="24">
                        </div>
                        <span class="menu-text">Messages</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link mx-3 rounded-3">
                        <div class="icon-placeholder bg-transparent d-flex align-items-center justify-content-center">
                            <img src="../Icons/flag.svg" alt="flag" class="img-fluid" width="24" height="24">
                        </div>
                        <span class="menu-text">Goal Setting</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- 
            2. MAIN CONTENT AREA
            This holds the Top Navbar and the actual Page Content.
            'bg-light' removed here because body CSS now sets the background color.
        -->
        <main id="content">

            <!-- 
                TOP NAVIGATION BAR
                Contains the toggle button, search, and user profile.
                Shadow is handled in CSS (box-shadow instead of border-bottom)
            -->
            <nav id="main-navbar" class="navbar navbar-expand sticky-top bg-white">
                <div class="container-fluid p-0 d-flex justify-content-between">

                    <!-- Left Section: Toggle Button & Search -->
                    <div class="d-flex align-items-center">
                        <!-- THE TOGGLE BUTTON: This is what triggers the JavaScript -->
                        <!-- Width and height are set with an ID selector in CSS -->
                        <button id="sidebarCollapse"
                            class="btn border-0 me-3 d-flex align-items-center justify-content-center">
                            <div class="hamburger-placeholder">
                                <img src="../Icons/toggle-btn.svg" alt="toggle-btn" class="img-fluid" width="25"
                                    height="25">
                            </div>
                        </button>
                        <!-- Search Box (Hidden on small mobile screens to save space) -->
                        <!-- Width is controlled by the .search-box class in CSS -->
                        <div class="search-box input-group d-none d-md-flex px-2">
                            <span class="input-group-text bg-light border-0">
                                <img src="../Icons/Search.svg" alt="search">
                            </span>
                            <input type="text" class="form-control bg-light border-0 py-2 rounded-3"
                                placeholder="Search">
                        </div>
                    </div>

                    <!-- Right Section: Actions & Profile -->
                    <div class="d-flex align-items-center">
                        <!-- Action Item Placeholders -->
                        <!-- Each uses 'action-icon' class for sizing (defined in CSS, not inline) -->
                        <div class="d-flex  d-none d-sm-flex">
                            <div class="action-icon me-3 d-flex justify-content-center align-items-center">
                                <img src="../Icons/theme-switcher.svg" alt="theme-toggle">
                            </div>
                            <div class="action-icon me-3 d-flex justify-content-center align-items-center">
                                <img src="../Icons/sms-notified.svg" alt="sms">
                            </div>
                            <!-- Sun/theme icon uses a separate class because it has different background color -->
                            <div class="action-icon me-3 d-flex justify-content-center align-items-center">
                                <img src="../Icons/notification.svg" alt="notification">
                            </div>
                        </div>
                        <!-- Profile Section -->
                        <!-- Profile avatar uses 'profile-avatar' class for sizing (defined in CSS, not inline) -->
                        <div class="d-flex justify-content-center align-items-center">
                            <div>
                                <img src="../Icons/profile.svg" alt="profile">
                            </div>
                        </div>
                    </div>

                </div>
            </nav>

            <!-- 
                ACTUAL PAGE CONTENT
                This is where your notes, dreamboard cards, etc., would go.
            -->
            <div class="container-fluid p-4">

            </div>

        </main>
    </div>

    <!-- 
        SCRIPTS
        - Bootstrap Bundle
        - Our custom logic in bookModule.js 
    -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JavaScript/bookModule.js"></script>
</body>

</html>
