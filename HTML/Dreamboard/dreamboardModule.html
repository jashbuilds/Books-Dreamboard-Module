<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dreamboard</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.0.1/dist/css/themes/splide-skyblue.min.css" />
        <link rel="stylesheet" href="../../CSS/styles.css">
        <link rel="stylesheet" href="../../CSS/sidebar.css">
        <link rel="stylesheet" href="../../CSS/dreamboardPage.css">
        <link rel="stylesheet" href="../../CSS/darkMode.css">
        <link rel="shortcut icon" href="../../Icons/dream-favicon.svg"
            type="image/x-icon">
        <script src="../../JavaScript/themeInit.js"></script>
    </head>

    <body class="preload-transitions">
        <div class="wrapper d-flex vh-100 overflow-hidden">

            <!-- Sidebar -->
            <nav id="sidebar" class="sidebar bg-white shadow">
                <div class="sidebar-header">
                    <div
                        class="logo-placeholder shadow bg-info bg-gradient rounded align-items-center justify-content-center"
                        id="logo-placeholder">
                        <span class="text-white fw-bold">ML</span>
                    </div>

                    <p
                        class="mb-0 fw-bold d-flex justify-content-center align-items-center logo-text text-uppercase">
                        <img src="../../Icons/Logo.svg" alt="Logo"
                            class="img-fluid" id="navLogo">
                    </p>
                </div>

                <!-- List of navigation items -->
                <ul class="nav flex-column mt-3 gap-1">
                    <li class="nav-item mx-3" data-bs-toggle="tooltip"
                        data-bs-placement="right" data-bs-title="Books">
                        <a href="../../HTML/Books/bookModule.html"
                            class="nav-link rounded-3 d-flex align-items-center justify-content-sm-start justify-content-center">

                            <div
                                class="icon-placeholder me-3 bg-transparent d-flex align-items-center justify-content-center">

                                <!-- SVG is used here directly because icon color will be change based on which menu is active. -->
                                <?xml version="1.0"
                                encoding="utf-8"?>
                                <svg width="25" height="25" viewBox="0 0 24 24"
                                    fill="none" stroke="#9b9898"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M4 19V6.2C4 5.0799 4 4.51984 4.21799 4.09202C4.40973 3.71569 4.71569 3.40973 5.09202 3.21799C5.51984 3 6.0799 3 7.2 3H16.8C17.9201 3 18.4802 3 18.908 3.21799C19.2843 3.40973 19.5903 3.71569 19.782 4.09202C20 4.51984 20 5.0799 20 6.2V17H6C4.89543 17 4 17.8954 4 19ZM4 19C4 20.1046 4.89543 21 6 21H20M9 7H15M9 11H15M19 17V21"
                                        stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>
                            </div>
                            <span class="menu-text fw-medium">Books</span>
                        </a>
                    </li>
                    <li class="nav-item mx-3" id="dreamboardMenu"
                        data-bs-toggle="tooltip" data-bs-placement="right"
                        data-bs-title="Dreamboard">
                        <a href="javascript: void(0)"
                            class="nav-link rounded-3 d-flex align-items-center justify-content-sm-start justify-content-center active">
                            <div
                                class="icon-placeholder me-3 bg-transparent d-flex align-items-center justify-content-center">

                                <!-- SVG is used here directly because icon color will be change based on which menu is active. -->
                                <?xml version="1.0"
                                encoding="utf-8"?>
                                <svg width="25" height="25" viewBox="0 0 20 20"
                                    fill="none" stroke="#9b9898"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <g clip-path="url(#clip0_2007_11517)">
                                        <path
                                            d="M10.517 17.3423C10.2337 17.4423 9.76699 17.4423 9.48366 17.3423C7.06699 16.5173 1.66699 13.0757 1.66699 7.24232C1.66699 4.66732 3.74199 2.58398 6.30033 2.58398C7.81699 2.58398 9.15866 3.31732 10.0003 4.45065C10.842 3.31732 12.192 2.58398 13.7003 2.58398C16.2587 2.58398 18.3337 4.66732 18.3337 7.24232C18.3337 13.0757 12.9337 16.5173 10.517 17.3423Z"
                                            stroke-width="1.2"
                                            stroke-linecap="round"
                                            stroke-linejoin="round" />
                                    </g>
                                    <defs>
                                        <clippath id="clip0_2007_11517">
                                            <rect width="20" height="20"
                                                fill="white" />
                                        </clippath>
                                    </defs>
                                </svg>

                            </div>
                            <span class="menu-text fw-medium">Dreamboard</span>
                        </a>
                    </li>

                </ul>
            </nav>

            <!-- Main body content -->
            <main
                class="main-content flex-grow-1 overflow-y-auto overflow-x-hidden">

                <!-- Top Navbar -->
                <nav id="main-navbar"
                    class="navbar navbar-expand main-navbar sticky-top bg-white shadow-sm py-3 px-2">
                    <div
                        class="container-fluid p-0 d-flex justify-content-between">

                        <!-- Left Section: Toggle Button & Search -->
                        <div class="d-flex align-items-center">
                            <button id="sidebarCollapseBtn"
                                class="btn border-0 me-2 d-flex align-items-center justify-content-center">
                                <div class="hamburger-placeholder">
                                    <img src="../../Icons/toggle-btn.svg"
                                        alt="toggle-btn" class="img-fluid"
                                        width="25"
                                        height="25">
                                </div>
                            </button>
                            <div
                                class="search-box input-group d-none d-md-flex px-2">
                                <span
                                    class="input-group-text bg-light border-0">
                                    <img src="../../Icons/Search.svg"
                                        alt="search">
                                </span>
                                <input type="text"
                                    class="form-control search-input fw-normal p-0 bg-light border-0 py-2 rounded-3"
                                    placeholder="Search">
                            </div>
                        </div>

                        <!-- Right Section: Actions & Profile -->
                        <div class="d-flex align-items-center me-3 gap-2">
                            <div class="d-flex gap-2 align-items-center">
                                <div
                                    class="me-3 d-flex justify-content-center align-items-center">
                                    <input type="checkbox"
                                        id="darkmode-toggle" />
                                    <label for="darkmode-toggle"
                                        class="darkmodeLabel"
                                        id="darkModeSwitch">
                                        <img src="../../Icons/sun.svg"
                                            alt="light-mode" width="28"
                                            height="28" class="sun">

                                        <img src="../../Icons/moon.svg"
                                            alt="dark-mode" width="28"
                                            height="28" class="moon">

                                    </label>
                                </div>
                                <div
                                    class="me-3 d-sm-flex d-none justify-content-center align-items-center">

                                    <img
                                        src="../../Icons/sms-notified-light.svg"
                                        alt="sms" class="smsIcon">

                                </div>
                                <div
                                    class="me-3 d-sm-flex d-none justify-content-center align-items-center">

                                    <img
                                        src="../../Icons/notification-light.svg"
                                        alt="notification"
                                        class="notificationIcon">

                                </div>
                            </div>
                            <div
                                class="d-flex justify-content-center align-items-center">
                                <div class="profileBlock">
                                    <img src="../../Icons/profile-light.svg"
                                        alt="profile" class="profileIcon">

                                </div>
                            </div>
                        </div>

                    </div>
                </nav>

                <!-- Body content -->
                <div class="bodyContent container-fluid p-4">
                    <div class="d-flex justify-content-between gap-2">
                        <div class="d-flex">
                            <p class="fs-4 m-0 fw-semibold">Dreamboard</p>
                        </div>

                        <div
                            class="d-flex flex-sm-row flex-column justify-content-center align-items-sm-center align-items-end gap-3">
                            <div
                                class="categoryFilter d-flex align-items-center gap-1 order-sm-0 order-1">
                                <p
                                    class="fw-medium text-secondary m-0 w-100 text-nowrap">Sort
                                    by:</p>
                                <select onchange="sortDreams()"
                                    class="fw-semibold bg-transparent border-0 cursor-pointer form-select py-1 ps-2 w-auto"
                                    id="categoryFilter"
                                    aria-label="Default select example">
                                    <option value="All" selected>All</option>
                                    <option value="ASC">Asc..</option>
                                    <option value="DESC">Desc.</option>
                                </select>
                            </div>

                            <!-- Add Dream button -->
                            <button
                                class="btn btn-primary addBtn px-md-4 px-3 py-2 order-sm-1 order-0"
                                data-bs-toggle="modal"
                                data-bs-target="#addDream"><span
                                    class="fw-medium">Add
                                    Dream</span></button>

                        </div>
                    </div>

                    <!-- All Dreamboard -->
                    <div class="mt-4">
                        <div class="row g-4 dreamBoardGrid" id="dreamBoardGrid">
                            <!-- Dreamboards will be available here. -->
                        </div>
                    </div>

                </div>

                <!-- Modal to add new Dream -->
                <div class="modal fade" id="addDream" tabindex="-1"
                    aria-labelledby="formModalLabel" aria-hidden="true">
                    <div
                        class="modal-dialog modal-dialog-centered modal-lg justify-content-center">
                        <div
                            class="modal-content w-80 rounded-3 shadow-lg border-0 addDreamModal">
                            <div
                                class="modal-header d-flex justify-content-start align-items-center border-bottom-0 px-4 py-3">
                                <p class="modal-title h2 fw-semibold mb-0 fs-4"
                                    id="formModalLabel">Add Dream</p>
                                <button type="button" class="btn-close pe-3"
                                    data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body p-4">
                                <form id="dreamForm">
                                    <div class="row g-4 py-2">
                                        <div class="col-12">
                                            <div>
                                                <label for="dreamName"
                                                    class="form-label fw-medium text-secondary">Name:</label>
                                                <input type="text"
                                                    oninput="validateFormInput(); validateNameInput()"
                                                    class="form-control form-control-lg"
                                                    id="dreamName"
                                                    placeholder="Enter dream name"
                                                    required>
                                                <div
                                                    class="invalid-feedback fw-semibold">Please
                                                    enter valid Dream name with
                                                    no leading space!</div>
                                            </div>
                                        </div>
                                        <div class="col-12">
                                            <div
                                                class="d-flex flex-column justify-content-center align-items-center"
                                                id="selectImage">
                                                <label for="productName"
                                                    class="form-label fw-medium text-secondary me-auto mb-0">Image</label>
                                                <br>
                                                <label for="addDreamImage"
                                                    id="drop-area"
                                                    class="cursor-pointer drop-area px-3 pt-2 w-80 dropArea">
                                                    <input type="file"
                                                        oninput="validateFormInput()"
                                                        class="form-control form-control-lg"
                                                        id="addDreamImage"
                                                        placeholder="Name"
                                                        accept="image/jpeg, image/png, image/webp, .jpg, .jpeg, .png, .webp"
                                                        hidden multiple
                                                        required>
                                                    <div id="img-view"
                                                        class="img-view d-flex gap-1 flex-column justify-content-center align-items-center rounded">
                                                        <img
                                                            src="../../Icons/dropImage-icon.svg"
                                                            alt="drop-icon"
                                                            width="75"
                                                            height="75">
                                                        <p
                                                            class="fw-bold text-center fs-5 imgCriteriaHead">Drag
                                                            & drop your Image,
                                                            or <span
                                                                class="text-primary">Browse</span></p>
                                                        <p
                                                            class="fw-semibold text-center text-secondary imgCriteriaSubHead">
                                                            File
                                                            Supported: JPG, PNG,
                                                            WebP <br> Maximum
                                                            size: 25 MB</p>
                                                        <p
                                                            class="fw-semibold text-center text-secondary imgCriteriaSubHead">
                                                            You
                                                            can upload upto 5
                                                            Images.</p>
                                                    </div>
                                                    <div
                                                        class="invalid-feedback"
                                                        id="invalidFileMsg">
                                                    </div>
                                                </label>

                                            </div>
                                            <div id="availableImages">
                                                <!-- Added images will be shown here. -->
                                            </div>

                                        </div>

                                    </div>
                                    <div
                                        class="d-flex gap-2 justify-content-end mt-3">
                                        <button type="button" id="cancelBtn"
                                            class="btn btn-outline-primary px-lg-5 px-3 py-lg-2 rounded-3 btn-decline"
                                            data-bs-dismiss="modal"><span>Cancel</span></button>
                                        <button type="submit"
                                            class="btn btn-submit-custom bg-primary cursor-nodrop text-white px-lg-5 px-3 py-lg-2 rounded-3 fw-bold btn-accept"
                                            id="submitBtn" disabled>
                                            <span
                                                class="spinner-border spinner-border-sm d-none"
                                                aria-hidden="true"
                                                id="formSubmitSpinner"></span>
                                            <span>Save</span>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Delete Confirmation Modal -->
                <div class="modal fade" id="deleteModal" tabindex="-1"
                    aria-labelledby="deleteModalLabel"
                    aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header border-bottom-0">
                                <h5 class="modal-title" id="deleteModalLabel">
                                    Delete Book</h5>
                                <button type="button" class="btn-close"
                                    data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body my-1">
                                Are you sure you want to delete this Dream?
                            </div>
                            <div class="modal-footer border-top-0">
                                <button type="button"
                                    class="btn btn-outline-primary px-5 btn-decline"
                                    data-bs-dismiss="modal">No</button>
                                <button type="button"
                                    class="btn btn-primary px-5 btn-accept"
                                    data-bs-dismiss="modal"
                                    id="confirmDelete"
                                    onclick="deleteDream()">
                                    <span
                                        class="spinner-border spinner-border-sm d-none"
                                        aria-hidden="true"
                                        id="deleteSpinner"></span>
                                    <span>Yes</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Notification Toast -->
                <div class="position-fixed bottom-0 end-0 p-3">
                    <div id="notificationToast" class="toast border-0 w-100"
                        role="alert" aria-live="assertive"
                        aria-atomic="true">
                        <div class="d-flex">
                            <div
                                class="toast-body toast-message fw-bold text-center">
                                <!-- Toast message -->
                            </div>
                            <button type="button"
                                class="btn-close btn-close-white me-2 m-auto"
                                data-bs-dismiss="toast"
                                aria-label="Close"></button>
                        </div>
                    </div>
                </div>

                <!-- Carousel Gallery Modal -->
                <div class="modal fade" id="carouselGallery" tabindex="-1"
                    aria-labelledby="exampleModalLabel">
                    <div class="modal-dialog modal-fullscreen p-3">
                        <div
                            class="modal-content bg-transparent carouselGallery">
                            <div class="modal-header border-bottom-0 p-0">
                                <button type="button"
                                    class="btn btn-close btn-light"
                                    data-bs-dismiss="modal"
                                    aria-label="Close">
                                </button>
                            </div>
                            <div
                                class="modal-body border-top-0 align-content-center">
                                <div id="imageCarousel">
                                    <!-- Carousel will be rendered here. -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Dream Rename Modal -->
                <div class="modal fade" id="renameModal" tabindex="-1"
                    aria-labelledby="renameModalLabel"
                    aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered renameModal">
                        <div class="modal-content">
                            <div class="modal-header border-bottom-0">
                                <h5 class="modal-title" id="deleteModalLabel">
                                    Update Dream</h5>
                                <button type="button" class="btn-close"
                                    data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body my-1">
                                <form id="dreamForm">
                                    <div class="row g-4 py-2">
                                        <div class="col-12">
                                            <div>
                                                <label for="dreamName"
                                                    class="form-label fw-medium text-secondary">Name:</label>
                                                <input type="text"
                                                    oninput="validateNameInput()"
                                                    class="form-control form-control-lg"
                                                    placeholder="Enter name"
                                                    id="renameDreamInput"
                                                    required>
                                                <div
                                                    class="invalid-feedback">Please
                                                    enter valid Dream name with
                                                    no leading space!</div>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div class="modal-footer border-top-0">
                                <button type="button"
                                    class="btn btn-outline-primary px-5 btn-decline"
                                    data-bs-dismiss="modal">Cancel</button>
                                <button type="button"
                                    class="btn btn-primary px-5 cursor-nodrop btn-accept"
                                    data-bs-dismiss="modal"
                                    id="confirmRename"
                                    onclick="updateDreamName()"
                                    disabled>
                                    <span
                                        class="spinner-border spinner-border-sm d-none"
                                        aria-hidden="true"
                                        id="renameSpinner"></span>
                                    <span>Save</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Modal to Upload new Image -->
                <div class="modal fade" id="uploadNewImage" tabindex="-1"
                    aria-labelledby="formModalLabel"
                    aria-hidden="true">
                    <div
                        class="modal-dialog modal-dialog-centered modal-lg justify-content-center">
                        <div
                            class="modal-content w-80 rounded-3 shadow-lg border-0 uploadNewImageModal">
                            <div
                                class="modal-header d-flex justify-content-start align-items-center border-bottom-0 px-4 py-3">
                                <p class="modal-title h2 fw-semibold mb-0 fs-4"
                                    id="formModalLabel">Upload Image</p>
                                <button type="button" class="btn-close"
                                    data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body p-4">
                                <form id="newImgUploadForm">
                                    <div class="row g-4 py-2">
                                        <div class="col-12 m-0">
                                            <div
                                                class="d-flex flex-column justify-content-center align-items-center"
                                                id="selectImage">
                                                <label for="addNewImage"
                                                    id="newDrop-area"
                                                    class="cursor-pointer drop-area px-3 pt-2 w-85">
                                                    <input type="file"
                                                        oninput="validateFormInput()"
                                                        class="form-control form-control-lg"
                                                        id="addNewImage"
                                                        placeholder="Name"
                                                        accept="image/jpeg, image/png, image/webp, .jpg, .jpeg, .png, .webp"
                                                        required hidden
                                                        multiple>
                                                    <div id="uploadedImg-view"
                                                        class="d-flex gap-1 flex-column justify-content-center align-items-center rounded">
                                                        <img
                                                            src="../../Icons/dropImage-icon.svg"
                                                            alt="drop-icon"
                                                            width="75"
                                                            height="75">
                                                        <p
                                                            class="fw-bold text-center fs-5 imgCriteriaHead">Drag
                                                            & drop your Image,
                                                            or <span
                                                                class="text-primary">Browse</span></p>
                                                        <p
                                                            class="fw-semibold text-center text-secondary imgCriteriaSubHead">
                                                            File
                                                            Supported: JPG, PNG,
                                                            WebP <br> Maximum
                                                            size: 25 MB</p>
                                                        <p id="uploadMessage"
                                                            class="fw-semibold d-none text-center text-secondary imgCriteriaSubHead"></p>
                                                    </div>
                                                    <div
                                                        class="invalid-feedback"
                                                        id="newFileUploadMsg">

                                                    </div>
                                                </label>
                                            </div>
                                            <p id="limitMessage"
                                                class="text-success d-none mt-2 text-center"></p>
                                            <div id="addedImages" class="mt-3">
                                                <!-- Added images will be shown here. -->
                                            </div>

                                        </div>

                                    </div>
                                    <div
                                        class="d-flex gap-2 justify-content-end mt-3">
                                        <button type="button" id="cancelBtn"
                                            class="btn btn-outline-primary px-lg-5 px-3 py-lg-2 rounded-3 btn-decline"
                                            data-bs-dismiss="modal"><span>Cancel</span></button>
                                        <button type="submit"
                                            class="btn btn-submit-custom bg-primary cursor-nodrop text-white px-lg-5 px-3 py-lg-2 rounded-3 fw-bold btn-accept"
                                            id="submitNewImgUpload" disabled>
                                            <span
                                                class="spinner-border spinner-border-sm d-none"
                                                aria-hidden="true"
                                                id="uploadImageSubmitSpinner"></span>
                                            <span>Save</span>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </main>

        </div>

        <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
        <script type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.0.1/dist/js/splide.min.js"
            defer></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../../JavaScript/dreamboardPage/dreamboardPage.js"
            defer></script>
        <script src="../../JavaScript/toggleSidebar.js" defer></script>
        <script src="../../JavaScript/darkMode.js"></script>

    </body>

</html>
